<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        body{
            margin: 0;
            height: 100vh;
            display: grid;
            place-items: center;
            background: #0d0d1a;
        }
        .calc{
            background: #1a1a2e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 20x rgb(0, 0, 0,.6);
            width: 320px;
        }
        #screen{
            width: 100%;
            height: 80px;
            font-size: 32px;
            text-align: left;
            background: #0a0a14;
            color: #00ff88;
            border: 0;
            border-radius: 12px;
            padding: 0 15px;
            margin-bottom: 15px;
        }
        .grid{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 12px;
        }
        button{
            height: 65px;
            font-size: 22px;
            border: 0;
            border-radius: 12px;
            background: #2a2a40;
            color: #fff;
            cursor: pointer;
        }
        button:active{transform: scale(.95);}
        .op{background: #ff9500;}
        .eq{grid-column: span 1; background: #007aff;}
        .clear{background: #ff3b30;}
        .del{background: #a5a5a5; color: #000;}



    </style>
</head>
<body>
    <div class="calc">
        <input id="screen" disabled placeholder="0">
        <div class="grid">
            <button class="clear">C</button>
            <button class="del">X</button>
            <button class="op">/</button>
            <button class="op">*</button>

            <button>7</button>
            <button>8</button>
            <button>9</button><button class="op">-</button>
            <button>4</button>
            <button>5</button>
            <button>6</button><button class="op">+</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
                        <button>%</button>

  
            <button style="grid-column: span 2;">0</button>
                        <button class="eq">=</button>

            <button>.</button>

        </div>
    </div>


    <script>
      
      const screen = document.getElementById('screen');
      let expr = '';

      document.querySelectorAll('button').forEach(btn=>
      {btn.onclick = () =>{const v = btn.textContent; 
       if(v==='C') expr = '';
       else if(v==='X') expr=expr.slice(0,-1);
       else if(v==='='){
        try{expr = Function('return ' + expr)().toString();}
        catch{expr = 'Error'; setTimeout(()=>expr='',800);}
       }
       else {expr+=v;}
       screen.value = expr || '0';

      }});

    addEventListener('keydown' , e=>{if('0123456789+-*/.%'.includes(e.key)){expr += e.key;
         screen.value=expr;}
        if(e.key==='Enter') document.querySelector('.eq').click();
        if(e.key=== 'Backspace'){expr=expr.slice(0,-1); screen.value=expr;}
        if(e.key=== 'Escape'){expr=''; screen.value='0';}
        
        });

    </script>
</body>
</html>
